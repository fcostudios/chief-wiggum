name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Frontend checks ──────────────────────────────────────────
  frontend:
    name: Frontend (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [typecheck, lint, format, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript type-check
        if: matrix.check == 'typecheck'
        run: npm run typecheck

      - name: ESLint
        if: matrix.check == 'lint'
        run: npm run lint

      - name: Prettier check
        if: matrix.check == 'format'
        run: npm run format:check

      - name: Unit tests
        if: matrix.check == 'test'
        run: npm run test:unit

  # ── Rust checks ──────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.check }}) / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        check: [test]
        include:
          - os: ubuntu-latest
            check: fmt
          - os: ubuntu-latest
            check: clippy
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt
        if: matrix.check == 'fmt'
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: matrix.check == 'clippy'
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        if: matrix.check == 'test'
        working-directory: src-tauri
        run: cargo test

  # ── Build verification ───────────────────────────────────────
  build:
    name: Build / ${{ matrix.os }}
    needs: [frontend, rust]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --ci

  # ── E2E tests (frontend-only Phase 1) ───────────────────────
  e2e:
    name: E2E Tests
    needs: [frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e_tests
        run: npx playwright test
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Fail job if E2E tests failed
        if: steps.e2e_tests.outcome == 'failure'
        run: exit 1

  # ── Coverage: Rust (cargo-tarpaulin, Ubuntu only) ────────────
  coverage-rust:
    name: Coverage (Rust)
    needs: [rust]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run Rust coverage
        working-directory: src-tauri
        run: |
          cargo tarpaulin \
            --out lcov \
            --output-dir ../coverage \
            --skip-clean \
            --timeout 120 \
            --exclude-files "src/main.rs" \
            -- --test-threads=1

      - name: Upload Rust LCOV
        uses: actions/upload-artifact@v4
        with:
          name: coverage-rust-lcov
          path: coverage/lcov.info
          retention-days: 7

  # ── Coverage: Frontend (vitest --coverage) ───────────────────
  coverage-frontend:
    name: Coverage (Frontend)
    needs: [frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run frontend coverage
        run: npm run test:coverage

      - name: Upload Frontend LCOV
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend-lcov
          path: coverage/lcov.info
          retention-days: 7

  # ── Coverage gate: merge, threshold, PR comment ─────────────
  coverage-gate:
    name: Coverage Gate
    needs: [coverage-rust, coverage-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Rust LCOV
        uses: actions/download-artifact@v4
        with:
          name: coverage-rust-lcov
          path: coverage-rust

      - name: Download Frontend LCOV
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend-lcov
          path: coverage-frontend

      - name: Run coverage gate
        id: gate
        run: |
          chmod +x scripts/coverage-gate.sh
          ./scripts/coverage-gate.sh \
            coverage-rust/lcov.info \
            coverage-frontend/lcov.info \
            75
        continue-on-error: true

      - name: Post PR coverage comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          COMMENT_MARKER='<!-- coverage-report -->'

          BODY="${COMMENT_MARKER}
          $(cat coverage/summary.md)"

          EXISTING=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${COMMENT_MARKER}\")) | .id" \
            2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            for id in $EXISTING; do
              gh api -X DELETE \
                "repos/${{ github.repository }}/issues/comments/${id}" \
                2>/dev/null || true
            done
          fi

          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Upload combined coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: |
            coverage/combined.info
            coverage/summary.md
          retention-days: 14

      - name: Fail if below threshold
        if: steps.gate.outcome == 'failure'
        run: |
          echo "::error::Coverage below threshold. See PR comment for details."
          exit 1
